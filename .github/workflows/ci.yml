name: CI — lint and test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8 dbt-core dbt-postgres

      - name: Lint Python
        run: |
          flake8 ingestion/ dags/ --max-line-length=120 --ignore=E501,W503

      - name: Validate dbt project
        run: |
          cd dbt_ons && dbt parse --profiles-dir .
        env:
          DBT_PROFILES_DIR: .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: airflow
          POSTGRES_PASSWORD: airflow
          POSTGRES_DB: airflow
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install psycopg2-binary pandas numpy requests python-dotenv

      - name: Create ons_pipeline database and schemas
        run: |
          PGPASSWORD=airflow psql -h localhost -U airflow -d airflow -c "CREATE DATABASE ons_pipeline;"
          PGPASSWORD=airflow psql -h localhost -U airflow -d ons_pipeline -f sql/init_db.sql || true

      - name: Run unit tests
        run: python -m pytest tests/ -v
        env:
          DB_HOST: localhost
          DB_USER: airflow
          DB_PASSWORD: airflow
          DB_NAME: ons_pipeline
