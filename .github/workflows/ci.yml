name: CI — lint and test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install flake8

      - name: Lint Python
        run: |
          flake8 ingestion/ dags/ \
            --max-line-length=120 \
            --extend-ignore=E501,W503,E302,E303,E305,W291,W293,E741,E402,F401

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: airflow
          POSTGRES_PASSWORD: airflow
          POSTGRES_DB: airflow
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install psycopg2-binary pandas numpy requests python-dotenv pytest

      - name: Create ons_pipeline database
        run: |
          PGPASSWORD=airflow psql -h localhost -U airflow -d airflow \
            -c "CREATE DATABASE ons_pipeline;" || true

      - name: Create schemas
        run: |
          PGPASSWORD=airflow psql -h localhost -U airflow -d ons_pipeline << 'SQL'
            CREATE SCHEMA IF NOT EXISTS bronze;
            CREATE SCHEMA IF NOT EXISTS silver;
            CREATE SCHEMA IF NOT EXISTS gold;
            CREATE TABLE IF NOT EXISTS bronze.ons_raw (
              id SERIAL PRIMARY KEY,
              dataset_id VARCHAR(50) NOT NULL,
              series_id VARCHAR(50) NOT NULL,
              period VARCHAR(10) NOT NULL,
              value TEXT,
              raw_json JSONB,
              ingested_at TIMESTAMP DEFAULT NOW()
            );
            CREATE TABLE IF NOT EXISTS silver.ons_indicators (
              id SERIAL PRIMARY KEY,
              dataset_id VARCHAR(50) NOT NULL,
              series_id VARCHAR(50) NOT NULL,
              indicator_name VARCHAR(200),
              period VARCHAR(10) NOT NULL,
              period_date DATE,
              value_raw TEXT,
              value_numeric NUMERIC(18,4),
              unit VARCHAR(50),
              is_valid BOOLEAN DEFAULT TRUE,
              loaded_at TIMESTAMP DEFAULT NOW(),
              UNIQUE (dataset_id, series_id, period)
            );
          SQL

      - name: Run unit tests
        run: python -m pytest tests/ -v
        env:
          DB_HOST: localhost
          DB_USER: airflow
          DB_PASSWORD: airflow
          DB_NAME: ons_pipeline