[flake8]
max-line-length = 120
extend-ignore =
    E501,
    W503,
    W504,
    E302,
    E303,
    E305,
    E306,
    W291,
    W293,
    W292,
    E741,
    E402,
    F401,
    E711,
    E712,
    C901,
    W605
exclude =
    .git,
    __pycache__,
    .venv,
    venv,
    dbt_ons,
    data,
    logs,
    .github
per-file-ignores =
    dags/*.py: E501,F401,E302,E303,W0611
    ingestion/*.py: E501,F401,E302
